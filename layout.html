<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <header class="section header">
        <div class="container">
            <h1>Content header here!</h1>
        </div>
    </header>
    <nav class="section menu">
        <div class="container">
            <h1>Content Menu here!</h1>
        </div>
    </nav>
    <section class="section banner-slider">
        <div class="container">
            <form method="get" action="#">
                <div class="form-group">
                    <label for="fullname">Tên của bạn:</label>
                    <input type="text" name="fullname" placeholder="Nhập tên của bạn">

                </div>
                <div class="form-group">
                    <label for="email">Email của bạn:</label>
                    <input type="email" name="email" placeholder="Nhập email của bạn">

                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" name="password" placeholder="Nhập mật khẩu">

                </div>
                <div class="form-group">
                    <label for="date">Ngày sinh:</label>
                    <input type="date" name="date">

                    <div class="form-group">
                        <label for="gender">Giới tính:</label>
                        <input type="radio" name="gender" value="male"> Nam
                        <input type="radio" name="gender" value="female "> Nữ
                        <input type="radio" name="gender" value="other"> Khác

                    </div>
                    <div class="form-group">
                        <label for="country">Quốc gia:</label>
                        <select name="country">
                            <option value="vietnam">Việt Nam</option>
                            <option value="usa">Mỹ</option>
                            <option value="japan">Nhật Bản</option>
                        </select>

                    </div>
                    <div class="form-group">
                        <label for="checkbox">
                            <input type="checkbox" name="checkbox" value="yes">Checkbox:</label>

                    </div>
                    <div class="form-group">
                        <label for="content">Nội dung:</label>
                        <textarea rows="4" name="content" placeholder="Nhập nội dung của bạn"></textarea>

                    </div>
                    <div class="form-group">
                        <button type="submit" value="save">Submit All</button>
                        <button type="submit" value="save draft">Submit Draft</button>
                    </div>
            </form>
            <div class="item">
                <img src="/images/anh1.png" alt="Description of the image" />
                <h3>Ảnh 1</h3>
                <p>Đây là ảnh 1</p>
                <p>20003934</p>
            </div>
            <div class="item">
                <img src="/images/anh1.png" alt="Description of the image" />
                <h3>Ảnh 1</h3>
                <p>Đây là ảnh 1</p>
                <p>20003934</p>
            </div>

                <img src="/images/anh1.png" alt="Description of the image" />
                <h3>Ảnh 1</h3>
                <p>Đây là ảnh 1</p>
                <p>20003934</p>
            </div>
            <div class="item">
                <img src="/images/anh1.png" alt="Description of the image" />
                <h3>Ảnh 1</h3>
                <p>Đây là ảnh 1</p>
                <p>20003934</p>
            </div>
        </div>
    </section>
    <main class="section main">
        <div class="container">
            <h1>Content Main here!</h1>
        </div>
    </main>
    <footer class="section footer">
        <div class="container">
            <h1>Content Footer here!</h1>
        </div>
    </footer>

</body>

</html>
